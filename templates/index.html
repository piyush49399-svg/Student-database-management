<!DOCTYPE html>
<html>
<head>
  <title>Student Management System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

  <h1 class="text-center mb-4">Student Management System</h1>

  <a href="/add" class="btn btn-primary mb-3">Add Student</a>

  <form method="POST" class="mb-3">
    <div class="input-group">
      <input type="text" name="search" class="form-control" placeholder="Search student by name">
      <button class="btn btn-primary">Search</button>
      <a href="/" class="btn btn-secondary">Reset</a>
    </div>
  </form>

  <table class="table table-bordered table-striped">

<thead>
  <tr>
    <th>ID</th>
    <th>Name</th>
    <th>Age</th>
    <th>Course</th>
    <th>Action</th>
  </tr>
</thead>

<tbody>
  {% for student in students %}
  <tr>
    <td>{{ loop.index }}</td>
    <td>{{ student[1] }}</td>
    <td>{{ student[2] }}</td>
    <td>{{ student[3] }}</td>
    <td>
      <a class="btn btn-warning btn-sm" href="/edit/{{ student[0] }}">Edit</a>
      <a class="btn btn-danger btn-sm" href="/delete/{{ student[0] }}">Delete</a>
    </td>
  </tr>
  {% endfor %}
</tbody>

</table>

</div>

</body>
</html>

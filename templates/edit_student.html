<!DOCTYPE html>
<html>

<head>
<title>Edit Student</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2 class="mb-4">Edit Student</h2>

<form method="POST">

<div class="mb-3">
<label class="form-label">Name</label>
<input class="form-control" type="text" name="name" value="{{student[1]}}">
</div>

<div class="mb-3">
<label class="form-label">Age</label>
<input class="form-control" type="number" name="age" value="{{student[2]}}">
</div>

<div class="mb-3">
<label class="form-label">Course</label>
<input class="form-control" type="text" name="course" value="{{student[3]}}">
</div>

<button class="btn btn-success">Update Student</button>

<a class="btn btn-secondary" href="/">Back</a>

</form>

</div>

</body>
</html>
